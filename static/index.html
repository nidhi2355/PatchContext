<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatchContext | AI History Assistant</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Base Theme */
        body { background-color: #0f1117; color: #e2e8f0; }
        
        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Loading Animation */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Clean Markdown Styling */
        #answerText h2, #answerText h3 { font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #f8fafc; }
        #answerText h2 { font-size: 1.25rem; }
        #answerText h3 { font-size: 1.1rem; }
        #answerText ul, #answerText ol { list-style-position: inside; margin-bottom: 1rem; padding-left: 0.5rem; text-align: left; }
        #answerText ul { list-style-type: disc; }
        #answerText ol { list-style-type: decimal; }
        #answerText li { margin-bottom: 0.25rem; }
        #answerText strong { color: #f8fafc; font-weight: 600; }
        #answerText blockquote { 
            border-left: 4px solid #3b82f6; padding-left: 1rem; margin: 1rem 0; 
            color: #94a3b8; font-style: italic; background: rgba(30, 41, 59, 0.3); 
            padding-top: 0.5rem; padding-bottom: 0.5rem; border-radius: 0 4px 4px 0; 
        }

        /* Markdown Tables Styling */
        #answerText table { 
            width: 100%; margin: 1.5rem 0; border-collapse: collapse; text-align: left; 
            background: rgba(30, 41, 59, 0.4); border-radius: 8px; overflow: hidden; 
        }
        #answerText th, #answerText td { padding: 0.75rem 1rem; border: 1px solid rgba(255, 255, 255, 0.1); }
        #answerText th { background-color: rgba(59, 130, 246, 0.2); color: #f8fafc; font-weight: 600; }
        #answerText tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.02); }

        /* Evidence Sidebar Styling */
        .evidence-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s ease;
        }
        .evidence-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(15, 23, 42, 0.8);
        }
        .evidence-content {
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        /* Custom Scrollbar for Evidence */
        .evidence-content::-webkit-scrollbar { width: 4px; }
        .evidence-content::-webkit-scrollbar-track { background: transparent; }
        .evidence-content::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .evidence-content h1, .evidence-content h2, .evidence-content h3 { color: #e2e8f0; font-size: 0.95rem; font-weight: 600; margin-bottom: 0.25rem; }
        .evidence-content p { margin-bottom: 0.5rem; }
        .evidence-content code { background: rgba(0,0,0,0.3); padding: 0.1rem 0.3rem; border-radius: 3px; font-family: monospace; color: #cbd5e1; }

        /* Evidence Markdown Styling */
        .evidence-text a { color: #60a5fa; text-decoration: underline; }
        .evidence-text strong { color: #f8fafc; }
        .evidence-text code { background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; font-family: monospace; }
        .evidence-text p { margin-bottom: 0.5rem; }
        
        /* Custom Scrollbar for Evidence Cards */
        .ev-scroll::-webkit-scrollbar { width: 4px; }
        .ev-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 font-sans">

    <!-- Header -->
    <header class="w-full max-w-5xl text-center my-8">
        <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">
            PatchContext
        </h1>
        <p class="text-slate-400 text-lg">AI-Powered Development History Assistant for FastAPI</p>
    </header>

    <!-- Search Box -->
    <div class="w-full max-w-5xl glass-panel rounded-2xl p-6 shadow-2xl mb-8">
        <div class="flex gap-4">
            <input type="text" id="queryInput" placeholder="e.g., What are the primary use cases for the Dependency Injection system?" 
                class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
            <button onclick="analyzeHistory()" id="searchBtn" 
                class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-lg transition-all shadow-[0_0_15px_rgba(37,99,235,0.5)] flex items-center justify-center min-w-[140px]">
                Analyze
            </button>
        </div>
    </div>

    <!-- Results Section -->
    <div id="resultsContainer" class="w-full max-w-5xl hidden flex-col md:flex-row gap-6">
        
        <!-- Synthesized Answer -->
        <div class="flex-1 glass-panel rounded-2xl p-6 shadow-lg">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">💡 Explanation</h2>
            
            <!-- NLI Badge -->
            <div id="nliBadge" class="mb-6 px-4 py-3 rounded-lg text-sm font-semibold"></div>
            
            <div id="answerText" class="text-slate-300 leading-relaxed mb-6"></div>
            
            <h3 class="text-lg font-bold mb-3 border-t border-slate-700 pt-4">📌 Citations</h3>
            <ul id="citationsList" class="space-y-2 text-sm"></ul>
        </div>

        <!-- Evidence Sidebar -->
        <div class="w-full md:w-1/3 glass-panel rounded-2xl p-6 shadow-lg h-fit">
            <h2 class="text-xl font-bold mb-4">📁 Retrieved Evidence</h2>
            <div id="evidenceList" class="space-y-4"></div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        async function analyzeHistory() {
            const input = document.getElementById('queryInput');
            const btn = document.getElementById('searchBtn');
            const results = document.getElementById('resultsContainer');
            const query = input.value.trim();

            if (!query) return;

            // UI Loading State
            btn.innerHTML = '<div class="loader"></div>';
            btn.disabled = true;
            results.classList.add('hidden');

            try {
                // Absolute URL pointing to your local FastAPI server
                const response = await fetch('http://127.0.0.1:8000/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: query })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    // 1. Populate Guardrail Badge
                    const badge = document.getElementById('nliBadge');
                    if (data.nli_status === 'ENTAILMENT') {
                        badge.className = 'mb-6 px-4 py-3 rounded-lg text-sm font-semibold bg-emerald-900/50 text-emerald-400 border border-emerald-700';
                        badge.innerText = '🔒 Fact Check: Verified';
                    } else if (data.nli_status === 'NEUTRAL') {
                        badge.className = 'mb-6 px-4 py-3 rounded-lg text-sm font-semibold bg-yellow-900/50 text-yellow-400 border border-yellow-700';
                        badge.innerText = '⚠️ Fact Check: Caution';
                    } else {
                        badge.className = 'mb-6 px-4 py-3 rounded-lg text-sm font-semibold bg-red-900/50 text-red-400 border border-red-700';
                        badge.innerText = '🚨 Fact Check: Contradiction';
                    }

                    // 2. Populate Citations
                    const cites = document.getElementById('citationsList');
                    cites.innerHTML = '';
                    data.citations.forEach((cite, idx) => {
                        cites.innerHTML += `<li><a href="${cite.source_url}" target="_blank" class="text-blue-400 hover:underline">[${idx + 1}] ${cite.type} on GitHub</a></li>`;
                    });

                    // 3. Populate Answer with Clean Markdown
                    let cleanMarkdown = data.answer
                        .replace(/([^\n])\n(\||---|:---)/g, '$1\n\n$2')
                        .replace(/([^\n])\n>/g, '$1\n\n>');
                    
                    document.getElementById('answerText').innerHTML = marked.parse(cleanMarkdown);

                    // 4. Populate Evidence Sidebar
                    const evList = document.getElementById('evidenceList');
                    evList.innerHTML = '';
                    data.evidence.forEach((ev, idx) => {
                        // Parse the raw markdown content of the evidence chunk
                        const parsedEvidence = marked.parse(ev.content);
                        
                        evList.innerHTML += `
                            <div class="evidence-card">
                                <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-700/50">
                                    <span class="text-xs font-bold text-blue-400">Fragment ${idx + 1}</span>
                                    <span class="text-[10px] font-semibold tracking-wider text-slate-500 bg-slate-800 px-2 py-1 rounded">${ev.type}</span>
                                </div>
                                <div class="evidence-content leading-relaxed">
                                    ${parsedEvidence}
                                </div>
                            </div>`;
                    });

                    // Show the UI
                    results.classList.remove('hidden');
                    results.classList.add('flex');
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("Error connecting to the backend. Please ensure your FastAPI server is running.");
            } finally {
                // Restore UI State
                btn.innerHTML = 'Analyze';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
